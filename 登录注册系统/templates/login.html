{% extends "base.html" %}

{% block title %}用户登录{% endblock %}

{% block content %}
<!-- 登录卡片 -->
<div class="auth-card">
    <!-- 顶部：标题 + 用户图标 -->
    <div class="auth-header">
        <h2>用户登录</h2>
        <div class="user-icon">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
            </svg>
        </div>
    </div>

    <div class="auth-body">
        <!-- 显示 Flask flash 提示消息（如"密码错误"） -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="flash-messages">
                {% for category, message in messages %}
                <div class="flash {{ category }}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}
        {% endwith %}

        <!-- 登录表单，提交到 /login -->
        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-group">
                <label for="username">邮箱/用户名</label>
                <div class="input-wrapper">
                    <span class="icon">✉</span>
                    <input type="text" id="username" name="username" placeholder="请输入您的邮箱/用户名" required>
                </div>
            </div>
            <div class="form-group">
                <label for="password">密码</label>
                <div class="input-wrapper">
                    <span class="icon">🔒</span>
                    <input type="password" id="password" name="password" placeholder="请输入您的密码" required>
                    <!-- 点击切换密码可见性 -->
                    <span class="toggle-password" onclick="togglePassword('password', this)">👁</span>
                </div>
            </div>
            <button type="submit" class="btn-primary">
                登录
                <span>➜</span>
            </button>
        </form>
    </div>

    <!-- 底部跳转链接 -->
    <div class="auth-footer">
        没有账号？<a href="{{ url_for('register') }}">立即注册</a>
    </div>
</div>

<!-- 密码显示/隐藏切换功能 -->
<script>
function togglePassword(inputId, toggle) {
    const input = document.getElementById(inputId);
    if (input.type === 'password') {
        input.type = 'text';
        toggle.textContent = '🙈';
    } else {
        input.type = 'password';
        toggle.textContent = '👁';
    }
}
</script>
{% endblock %}
